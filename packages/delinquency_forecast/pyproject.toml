[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "delinquency-forecast"
version = "0.1.0"
description = "Spatial-temporal crime prediction pipeline for Jalisco"
requires-python = ">=3.11"
dependencies = [
    "lightgbm>=4.0",
    "pandas>=2.0",
    "numpy>=1.24",
    "scipy>=1.11",
    "h3>=3.7",
    "holidays>=0.40",
    "scikit-learn>=1.3",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov"]

[tool.setuptools.packages.find]
where = ["."]
include = ["delinquency_forecast*"]

[tool.setuptools.package-data]
delinquency_forecast = ["artifacts/*.pkl"]
